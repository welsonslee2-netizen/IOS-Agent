name: 🍎 Build iOS IPA (Free - No Paid Cert)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  BRIEFCASE_VERSION: "0.3.19"

jobs:
  # ── 代码检查 ──────────────────────────────────
  lint:
    name: 🔍 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check src/ --output-format=github

  # ── 构建 IPA（SideStore 免费安装）───────────────
  build-ipa:
    name: 📱 构建 IPA
    runs-on: macos-latest
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 查看 Xcode
        run: |
          xcode-select --print-path
          xcodebuild -version
          xcodebuild -showsdks

      - name: 安装 Briefcase
        run: pip install briefcase==${{ env.BRIEFCASE_VERSION }}

      - name: 创建 iOS 项目
        run: briefcase create iOS --no-input

      - name: 构建 iOS 应用
        run: briefcase build iOS --no-input

      # ── 打包成 IPA（用于 SideStore）───────────────
      - name: 打包 IPA
        run: |
          APP_PATH=$(find build/iosagent/iOS -name "*.app" -maxdepth 2 | head -1)
          echo "APP_PATH=$APP_PATH"
          IPA_DIR="$RUNNER_TEMP/ipa_payload"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r "$RUNNER_TEMP/iOS-Agent.ipa" .
          ls -lh "$RUNNER_TEMP/iOS-Agent.ipa"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Agent-IPA
          path: ${{ runner.temp }}/iOS-Agent.ipa
          retention-days: 30

  # ── 失败通知 ──────────────────────────────────
  notify:
    name: 📬 构建完成通知
    runs-on: ubuntu-latest
    needs: build-ipa
    if: always()
    steps:
      - name: 检查结果
        run: |
          if [ "${{ needs.build-ipa.result }}" == "success" ]; then
            echo "✅ iOS Agent IPA 构建成功！"
            echo "请下载 artifacts 中的 iOS-Agent.ipa 文件"
            echo "然后使用 SideStore 安装到 iPhone"
          else
            echo "❌ 构建失败，请检查日志"
          fi
