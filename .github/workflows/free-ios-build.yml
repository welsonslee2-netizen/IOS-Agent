name: 🍎 Build iOS IPA (SideStore Ready)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.0"
  IOS_VERSION: "15.0"

jobs:
  # ── 代码检查 ──────────────────────────────────
  lint:
    name: 🔍 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check ios/ --output-format=github

  # ── 构建 IPA ──────────────────────────────────
  build:
    name: 📱 构建 IPA
    runs-on: macos-latest
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 诊断环境
        run: |
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version
          xcode-select --print-path

      - name: 安装工具
        run: |
          # 安装 XcodeGen
          brew install xcodegen || true
          xcodegen --version
          echo ""
          # 检查 openssl 和 codesign
          echo "openssl: $(which openssl)"
          echo "codesign: $(which codesign)"
          openssl version

      - name: 生成 Xcode 项目
        run: |
          cd ios
          xcodegen generate
          echo "=== 生成的项目 ==="
          ls -la

      - name: 列出可用 Scheme
        run: |
          cd ios
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -1)
          echo "项目: $XCODEPROJ"
          xcodebuild -project "$XCODEPROJ" -list || true

      - name: 构建项目
        id: build
        run: |
          cd ios
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -1)
          SCHEME=$(xcodebuild -project "$XCODEPROJ" -list 2>/dev/null | grep -A1 "Schemes:" | tail -1 | tr -d ' ')
          echo "构建 Scheme: $SCHEME"

          # 构建真机版本 arm64
          # iOS 18.5 SDK 不允许 Ad Hoc，必须完全禁用签名，构建后再用 ldid 伪签名
          xcodebuild -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            DEAD_CODE_STRIPPING=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            2>&1 | tee build.log

          echo ""
          echo "=== 构建结果检查 ==="
          if grep -q "error:" build.log; then
            echo "⚠️ 发现编译错误："
            grep "error:" build.log | head -20
          fi

          echo ""
          echo "=== 构建日志末尾 (最后30行) ==="
          tail -30 build.log

          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ 构建成功"
          else
            echo "❌ 构建失败"
            grep -B2 -A5 "error:" build.log || true
            exit 1
          fi

      - name: 保存构建日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ios/build.log
          retention-days: 30

      - name: 查找构建产物并诊断
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "✅ 找到 App: $APP_PATH"
            echo "App 大小: $(du -sh "$APP_PATH")"
            echo ""
            echo "=== App 完整文件列表 ==="
            find "$APP_PATH" -type f
          else
            echo "❌ 未找到 .app"
            find ios/build -type d | head -30
            exit 1
          fi

      - name: 自签名 + 打包 IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          APP_BUNDLE=$(basename "$APP_PATH")
          APP_NAME="${APP_BUNDLE%.app}"
          EXECUTABLE="$APP_PATH/$APP_NAME"

          echo "✅ App: $APP_PATH"
          echo "Executable: $EXECUTABLE"

          # ── 创建自签名证书 ──
          echo "=== 创建自签名证书 ==="
          CERT_NAME="iOS Dev Certificate"
          
          # 创建证书配置文件
          cat > /tmp/cert.conf << 'CERTEOF'
          [req]
          default_bits = 2048
          prompt = no
          distinguished_name = req_dn
          [req_dn]
          CN = "iPhone Developer"
          OU = "iOS Development"
          O = "Developer"
          C = US
          CERTEOF

          # 生成私钥和证书
          openssl genrsa -out /tmp/signing.key 2048 2>/dev/null
          openssl req -new -x509 -days 3650 -key /tmp/signing.key \
            -out /tmp/signing.crt \
            -subj "/CN=iPhone Developer/OU=iOS Development/O=Developer/C=US" 2>/dev/null

          # 创建 p12 证书包
          openssl pkcs12 -export \
            -in /tmp/signing.crt \
            -inkey /tmp/signing.key \
            -out /tmp/signing.p12 \
            -password pass:abcd1234 2>/dev/null

          echo "✅ 证书创建完成"

          # ── 导入证书到 Keychain ──
          echo "=== 导入证书到 Keychain ==="
          security create-keychain -p "keychain" ~/Library/Keychains/build.keychain
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/build.keychain
          security unlock-keychain -p "keychain" ~/Library/Keychains/build.keychain
          
          # 导入证书
          security import /tmp/signing.p12 -P "abcd1234" -A -t cert \
            -k ~/Library/Keychains/build.keychain
          security import /tmp/signing.crt -A -t cert \
            -k ~/Library/Keychains/build.keychain
          
          # 信任证书
          security set-key-partition-list -S apple-tool:,apple: \
            -k "keychain" ~/Library/Keychains/build.keychain 2>/dev/null || true
          
          echo "✅ Keychain 配置完成"

          # ── 使用 codesign 签名 ──
          echo "=== 使用 codesign 签名 ==="
          security list-keychains -s ~/Library/Keychains/build.keychain
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "keychain" ~/Library/Keychains/build.keychain

          # 创建 entitlements
          cat > /tmp/entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.associated-domains</key>
            <array/>
            <key>application-identifier</key>
            <string>com.welsonslee.iosagent.dev</string>
            <key>get-task-allow</key>
            <true/>
            <key>com.apple.developer.team-identifier</key>
            <string></string>
          </dict>
          </plist>
          EOF

          # codesign 签名（使用 -f 强制覆盖）
          echo "签名可执行文件: $EXECUTABLE"
          codesign -f -v -s "iPhone Developer" \
            -ent /tmp/entitlements.plist \
            --force \
            "$EXECUTABLE" 2>&1 || echo "Executable 签名尝试..."

          # 对 Frameworks 签名
          echo "=== 签名 Frameworks ==="
          find "$APP_PATH/Frameworks" -type f 2>/dev/null | while read f; do
            echo "  signing: $f"
            codesign -f -v -s "iPhone Developer" \
              -ent /tmp/entitlements.plist \
              --force "$f" 2>/dev/null || true
          done

          # 对 PlugIns 签名
          find "$APP_PATH/PlugIns" -type f 2>/dev/null | while read f; do
            echo "  signing: $f"
            codesign -f -v -s "iPhone Developer" \
              -ent /tmp/entitlements.plist \
              --force "$f" 2>/dev/null || true
          done

          # 验证签名
          echo ""
          echo "=== 签名验证 ==="
          codesign -v "$EXECUTABLE" 2>&1 || true
          
          # 列出所有签名状态
          echo ""
          echo "=== App 签名状态 ==="
          find "$APP_PATH" -type f -name "*.dylib" -o -name "iosagent" | while read f; do
            echo -n "$f: "
            codesign -v "$f" 2>&1 | head -1 || echo "未签名"
          done

          # ── 打包 IPA ──
          echo ""
          echo "=== 打包 IPA ==="
          IPA_DIR="$RUNNER_TEMP/ios_ipa"
          OUTPUT_IPA="$RUNNER_TEMP/iOS-Agent.ipa"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"

          cp -pR "$APP_PATH" "$IPA_DIR/Payload/"

          # 用 ditto 打包
          cd "$IPA_DIR"
          ditto -c -k --sequesterRsrc --keepParent Payload "$OUTPUT_IPA"

          echo ""
          echo "=== IPA 信息 ==="
          ls -lah "$OUTPUT_IPA"

          IPA_SIZE=$(stat -f%z "$OUTPUT_IPA")
          echo "IPA 大小: $((IPA_SIZE / 1024)) KB"

          echo "✅ IPA 打包完成"

          # 验证 IPA 内容
          echo ""
          echo "=== IPA 内容（前10项）==="
          unzip -l "$OUTPUT_IPA" | head -12

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Agent-IPA
          path: ${{ runner.temp }}/iOS-Agent.ipa
          retention-days: 30
