name: 🍎 Build iOS IPA (SideStore Ready)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.0"
  IOS_VERSION: "15.0"

jobs:
  # ── 代码检查 ──────────────────────────────────
  lint:
    name: 🔍 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check ios/ --output-format=github

  # ── 构建 IPA ──────────────────────────────────
  build:
    name: 📱 构建 IPA
    runs-on: macos-latest
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 诊断环境
        run: |
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version
          xcode-select --print-path

      - name: 安装工具
        run: |
          # 安装 XcodeGen
          brew install xcodegen || true
          xcodegen --version
          # 安装 ldid（用于伪签名，让 Sideloadly 能处理）
          brew install ldid || true
          which ldid && ldid || true

      - name: 生成 Xcode 项目
        run: |
          cd ios
          xcodegen generate
          echo "=== 生成的项目 ==="
          ls -la

      - name: 列出可用 Scheme
        run: |
          cd ios
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -1)
          echo "项目: $XCODEPROJ"
          xcodebuild -project "$XCODEPROJ" -list || true

      - name: 构建项目
        id: build
        run: |
          cd ios
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -1)
          SCHEME=$(xcodebuild -project "$XCODEPROJ" -list 2>/dev/null | grep -A1 "Schemes:" | tail -1 | tr -d ' ')
          echo "构建 Scheme: $SCHEME"

          # 构建真机版本 arm64
          # iOS 18.5 SDK 不允许 Ad Hoc，必须完全禁用签名，构建后再用 ldid 伪签名
          xcodebuild -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            DEAD_CODE_STRIPPING=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            2>&1 | tee build.log

          echo ""
          echo "=== 构建结果检查 ==="
          if grep -q "error:" build.log; then
            echo "⚠️ 发现编译错误："
            grep "error:" build.log | head -20
          fi

          echo ""
          echo "=== 构建日志末尾 (最后30行) ==="
          tail -30 build.log

          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ 构建成功"
          else
            echo "❌ 构建失败"
            grep -B2 -A5 "error:" build.log || true
            exit 1
          fi

      - name: 保存构建日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ios/build.log
          retention-days: 30

      - name: 查找构建产物并诊断
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "✅ 找到 App: $APP_PATH"
            echo "App 大小: $(du -sh "$APP_PATH")"
            echo ""
            echo "=== App 完整文件列表 ==="
            find "$APP_PATH" -type f
          else
            echo "❌ 未找到 .app"
            find ios/build -type d | head -30
            exit 1
          fi

      - name: 伪签名 + 打包 IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
          APP_BUNDLE=$(basename "$APP_PATH")
          APP_NAME="${APP_BUNDLE%.app}"
          EXECUTABLE="$APP_PATH/$APP_NAME"

          echo "✅ App: $APP_PATH"
          echo "Executable: $EXECUTABLE"

          # ── 伪签名（让 Sideloadly 能正常处理）──
          if [ -f "$EXECUTABLE" ]; then
            echo "=== 对可执行文件进行伪签名 ==="
            ldid -S "$EXECUTABLE" && echo "✅ ldid 签名成功" || echo "⚠️ ldid 签名失败（继续）"
          fi

          # 也对 Frameworks 里的二进制做伪签名
          find "$APP_PATH/Frameworks" -type f -name "*.dylib" 2>/dev/null | while read f; do
            echo "  signing: $f"
            ldid -S "$f" || true
          done

          # ── 用 zip 打包 IPA ──
          IPA_DIR="$RUNNER_TEMP/ios_ipa"
          OUTPUT_IPA="$RUNNER_TEMP/iOS-Agent.ipa"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"

          cp -R "$APP_PATH" "$IPA_DIR/Payload/"

          echo ""
          echo "=== Payload 结构 ==="
          ls -la "$IPA_DIR/Payload/"

          # 用 ditto 保留权限打包（macOS 原生，最可靠）
          cd "$IPA_DIR"
          ditto -c -k --sequesterRsrc --keepParent Payload "$OUTPUT_IPA"

          echo ""
          echo "=== IPA 信息 ==="
          ls -lah "$OUTPUT_IPA"

          IPA_SIZE=$(stat -f%z "$OUTPUT_IPA")
          echo "IPA 大小: $((IPA_SIZE / 1024)) KB"

          if [ "$IPA_SIZE" -lt 50000 ]; then
            echo "❌ IPA 太小，打包可能有问题"
            exit 1
          fi

          echo "✅ IPA 打包完成"

          # 验证 IPA 内容
          echo ""
          echo "=== IPA 内容验证 ==="
          unzip -l "$OUTPUT_IPA" | head -20

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Agent-IPA
          path: ${{ runner.temp }}/iOS-Agent.ipa
          retention-days: 30
