name: 🍎 Build iOS IPA (Free - No Paid Cert)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  BRIEFCASE_VERSION: "0.4.0"

jobs:
  # ── 代码检查 ──────────────────────────────────
  lint:
    name: 🔍 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check src/ --output-format=github

  # ── 构建 IPA（SideStore 免费安装）───────────────
  build-ipa:
    name: 📱 构建 IPA
    runs-on: macos-latest
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 查看 Xcode 和可用模拟器
        run: |
          echo "=== Xcode 版本 ==="
          xcode-select --print-path
          xcodebuild -version
          echo ""
          echo "=== 可用 SDK ==="
          xcodebuild -showsdks
          echo ""
          echo "=== 可用模拟器 ==="
          xcrun simctl list devices available | grep -E "iPhone|iPad"

      - name: 安装 Briefcase
        run: pip install briefcase==${{ env.BRIEFCASE_VERSION }}

      - name: 创建 iOS 项目
        run: briefcase create iOS --no-input

      - name: 查看生成的项目结构
        run: |
          echo "=== iOS 目录结构 ==="
          ls -la build/iosagent/iOS/
          echo ""
          echo "=== 查找 Xcode 项目 ==="
          find build/iosagent/iOS -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null

      - name: 构建 Xcode 项目
        id: build
        run: |
          cd build/iosagent/iOS
          
          # 查找 Xcode 项目
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -1)
          echo "找到项目: $XCODEPROJ"
          
          # 列出所有 scheme
          echo "=== 可用 Scheme ==="
          xcodebuild -project "$XCODEPROJ" -list
          
          # 获取 scheme 名称
          SCHEME=$(xcodebuild -project "$XCODEPROJ" -list | grep -A1 "Schemes:" | tail -1 | tr -d ' ')
          echo "使用 Scheme: $SCHEME"
          
          # 获取可用 iPhone 模拟器
          DESTINATION=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/.*(\(.*\)).*/\1/' | tr -d ' ')
          if [ -z "$DESTINATION" ]; then
            DESTINATION="platform=iOS Simulator,name=iPhone 15"
          fi
          echo "使用目标: $DESTINATION"
          
          # 构建
          echo "=== 开始构建 ==="
          xcodebuild -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination generic/platform=iOS\ Simulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tail -50
          
          echo "=== 构建完成 ==="

      - name: 查找构建产物
        run: |
          echo "=== 查找 .app 文件 ==="
          find build -name "*.app" -type d 2>/dev/null
          APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          echo "APP_PATH=$APP_PATH"
          echo "APP_SIZE=$(du -sh "$APP_PATH" 2>/dev/null || echo 'unknown')"

      - name: 打包 IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件，构建可能失败了"
            echo "尝试查看 build 目录内容..."
            ls -la build/ 2>/dev/null || echo "build 目录不存在"
            exit 1
          fi
          
          echo "✅ 找到 App: $APP_PATH"
          IPA_DIR="$RUNNER_TEMP/ipa_payload"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r "$RUNNER_TEMP/iOS-Agent.ipa" .
          echo "✅ IPA 大小: $(du -sh $RUNNER_TEMP/iOS-Agent.ipa)"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Agent-IPA
          path: ${{ runner.temp }}/iOS-Agent.ipa
          retention-days: 30
