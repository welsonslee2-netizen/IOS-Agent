[tool.briefcase]
project_name = "iOS Agent"
bundle = "com.iosagent"
version = "0.1.0"
url = "https://github.com/your-username/ios-agent"
license = "MIT"
author = "Your Name"
author_email = "your@email.com"

[tool.briefcase.app.iosagent]
formal_name = "iOS Agent"
description = "An AI-powered agent that runs Python code on iOS"
long_description = """An intelligent iOS Agent powered by LLM that can execute Python code,
manage projects, and automate tasks directly on your iPhone or iPad."""
icon = "src/iosagent/resources/icon"
sources = ["src/iosagent"]
requires = [
    "httpx>=0.27.0",
    "toga>=0.4.5",
]

[tool.briefcase.app.iosagent.iOS]
requires = [
    "httpx>=0.27.0",
    "toga>=0.4.5",
]
# iOS 权限声明
info = {
    "NSCameraUsageDescription" = "iOS Agent needs camera access for visual analysis.",
    "NSMicrophoneUsageDescription" = "iOS Agent needs microphone for voice commands.",
    "NSPhotoLibraryUsageDescription" = "iOS Agent needs photo library access.",
}
